<main class="product-page">
  <div class="producto-container">
    <header class="producto-header">
      <div>
        <h1 class="producto-header__title">Nuevo producto</h1>

        <p class="producto-header__description">
          Captura la información necesaria para registrar un producto.
        </p>
      </div>
    </header>
    <!--mandamos mensaje de error o éxito -->
    @if (guardadoCorrectamente()){
    <div class="alert alert-success producto-alert"role="alert">
            <span>Producto guardado correctamente.</span>
            <button type="button" class="producto-alert__close" aria-label="Cerrar mensaje"
            (click)="cerrarMensaje()">&times;</button>
      </div>
    }
    @if(errorServidor()){
    <!--mandamos mensaje de error o éxito -->
    <div class="alert alert-danger producto-alert" role="alert">
      <span>Ocurrio un error al guardar el producto.</span><!--cambiamos por una iterpolacion-->
      <button type="button" class="producto-alert__close" aria-label="Cerrar mensaje" (click)="cerrarMensaje()">
        &times;
      </button>
    </div>
  }
  </div>
  <!--iniciamos la logica del formulario-->
  <form autocomplete="off">
  
    <div class="row g-4">
    <!--Informacion general-->
    <div class="col-12 col-xl-8 card shadow p-3 mb-5 bg-body rounded">

    </div>
    <!--columna derecha-->
    <div class="col-12 col-xl-4 card shadow me-px  p-3 mb-5 bg-body rounded"></div>
    </div>
  
</form>
  <!--cerramos el formulario-->
</main>
